# Project-scoped Codex config (trusted projects only — see
# https://developers.openai.com/codex/mcp). Mirrors .cursor/mcp.json; both are
# generated from plugins/vertical-plugins/financial-analysis/.mcp.json, which
# has a JSON syntax error upstream (missing comma/brace after "egnyte").
# Fixed here rather than propagating the bug into a second file.
#
# All servers are third-party financial-data vendors. None are usable without
# the corresponding paid entitlement/credentials — enable only what you have
# access to (set `enabled = false` or delete unused entries).

[mcp_servers.daloopa]
url = "https://mcp.daloopa.com/server/mcp"

